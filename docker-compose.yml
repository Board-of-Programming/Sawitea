version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:14-alpine
    container_name: sawitea-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sawitea
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - sawitea-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis for Bull Queue
  redis:
    image: redis:7-alpine
    container_name: sawitea-redis
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - sawitea-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Backend API (Development)
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    container_name: sawitea-api
    environment:
      - NODE_ENV=development
      - PORT=3001
      - FRONTEND_URL=http://localhost:3000
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/sawitea
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - BETTER_AUTH_SECRET=dev-secret-key-min-32-chars
      - BETTER_AUTH_URL=http://localhost:3001
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/api/node_modules
      - /app/packages/database/node_modules
      - /app/packages/shared/node_modules
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sawitea-network
    command: npm run start:dev --workspace=api

  # Frontend (Development)
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.dev
    container_name: sawitea-web
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
      - BETTER_AUTH_SECRET=dev-secret-key-min-32-chars
      - BETTER_AUTH_URL=http://localhost:3001
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/web/node_modules
      - /app/packages/database/node_modules
      - /app/packages/shared/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - sawitea-network
    command: npm run dev --workspace=web

volumes:
  postgres-data:
  redis-data:

networks:
  sawitea-network:
    driver: bridge
